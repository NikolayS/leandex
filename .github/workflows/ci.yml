name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  shell-lint:
    name: shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Check shell formatting
        run: shfmt -i 2 -ci -bn -sr -d test/run_tests.sh ci/e2e_bloat_reduction.sh
      - name: Run shellcheck
        run: shellcheck -x test/run_tests.sh ci/e2e_bloat_reduction.sh

  sql-security:
    name: sql security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SQL construction and secrets
        run: |
          set -euo pipefail
          echo "Checking for suspicious dynamic SQL concatenation..."
          if grep -E "EXECUTE[[:space:]]+[^;]*\|\|[[:space:]]*[^';]*\|\|" *.sql | grep -v "format\|quote_ident\|quote_literal"; then
            echo "Potential SQL injection pattern found"
            exit 1
          fi
          echo "Checking for hardcoded SQL passwords..."
          if grep -E "(PASSWORD|IDENTIFIED BY)[[:space:]]*[=:][[:space:]]*'[^']+'" *.sql | grep -v "your_secure_password\|your_password\|changeme\|testpass"; then
            echo "Hardcoded password found"
            exit 1
          fi

  tests:
    name: postgres ${{ matrix.pg }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['13', '14', '15', '16', '17', '18']
    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run SQL test suite
        env:
          PGPASSWORD: postgres
        run: |
          chmod +x test/run_tests.sh
          ./test/run_tests.sh -h 127.0.0.1 -p 5432 -u postgres -w postgres -d test_leandex
      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-pg-${{ matrix.pg }}
          path: test/test-results.xml

  sql-install:
    name: sql install postgres ${{ matrix.pg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['13', '14', '15', '16', '17', '18']
    steps:
      - uses: actions/checkout@v4
      - name: Install via psql, register target, verify over Docker network
        run: |
          set -euo pipefail
          net="leandex-sql-install-${{ matrix.pg }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          pg="leandex-sql-install-pg-${{ matrix.pg }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker network create "$net"
          cleanup() {
            docker rm -f "$pg" >/dev/null 2>&1 || true
            docker network rm "$net" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name "$pg" --network "$net" --network-alias postgres \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=postgres \
            postgres:${{ matrix.pg }}-alpine
          for i in $(seq 1 60); do
            if docker run --rm --network "$net" -e PGPASSWORD=postgres postgres:${{ matrix.pg }}-alpine \
              pg_isready -h postgres -p 5432 -U postgres >/dev/null 2>&1; then
              break
            fi
            sleep 1
            if [ "$i" -eq 60 ]; then
              docker logs "$pg"
              exit 1
            fi
          done
          docker run --rm --network "$net" -e PGPASSWORD=postgres \
            postgres:${{ matrix.pg }}-alpine \
            createdb -h postgres -p 5432 -U postgres leandex_control_ci

          printf "create extension if not exists postgres_fdw;\ncreate extension if not exists dblink;\n\\i leandex.sql\n" | \
            docker run --rm -i --network "$net" -v "$PWD:/work" -w /work -e PGPASSWORD=postgres \
              postgres:${{ matrix.pg }}-alpine \
              psql -h postgres -p 5432 -U postgres -d leandex_control_ci -v ON_ERROR_STOP=1

          docker run --rm --network "$net" -e PGPASSWORD=postgres \
            postgres:${{ matrix.pg }}-alpine \
            psql -h postgres -p 5432 -U postgres -d leandex_control_ci -v ON_ERROR_STOP=1 \
              -c "create server target_postgres foreign data wrapper postgres_fdw options (host 'postgres', port '5432', dbname 'postgres')" \
              -c "create user mapping for current_user server target_postgres options (user 'postgres', password 'postgres')" \
              -c "insert into leandex.target_databases(database_name, host, port, fdw_server_name, enabled) values ('postgres', 'postgres', 5432, 'target_postgres', true)"

          docker run --rm --network "$net" -e PGPASSWORD=postgres \
            postgres:${{ matrix.pg }}-alpine \
            psql -h postgres -p 5432 -U postgres -d leandex_control_ci -v ON_ERROR_STOP=1 -At \
              -c "select component || chr(124) || status || chr(124) || details from leandex.check_fdw_security_status()" \
              -c "select component || chr(124) || is_ok || chr(124) || details from leandex.check_environment()" \
            > /tmp/leandex-verify.txt

          cat /tmp/leandex-verify.txt
          grep -q "Overall security status|SECURE" /tmp/leandex-verify.txt
          grep -q "Control DB: registered targets|true|postgres" /tmp/leandex-verify.txt
          grep -q "FDW self-connection test|true|Connected via user mapping" /tmp/leandex-verify.txt


  e2e-bloat-reduction:
    name: postgres 18 e2e bloat reduction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bloat reduction scenario over Docker network
        run: |
          set -euo pipefail
          net="leandex-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          pg="leandex-e2e-pg-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker network create "$net"
          cleanup() {
            docker rm -f "$pg" >/dev/null 2>&1 || true
            docker network rm "$net" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name "$pg" --network "$net" --network-alias postgres \
            -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=postgres \
            postgres:18-alpine
          for i in $(seq 1 60); do
            if docker run --rm --network "$net" -e PGPASSWORD=postgres postgres:18-alpine \
              pg_isready -h postgres -p 5432 -U postgres >/dev/null 2>&1; then
              break
            fi
            sleep 1
            if [ "$i" -eq 60 ]; then
              docker logs "$pg"
              exit 1
            fi
          done
          docker run --rm --network "$net" -v "$PWD:/work" -w /work \
            -e DB_HOST=postgres \
            -e FDW_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASS=postgres \
            -e PGPASSWORD=postgres \
            postgres:18-alpine sh -lc '
              apk add --no-cache bash >/dev/null
              chmod +x ci/e2e_bloat_reduction.sh
              ci/e2e_bloat_reduction.sh
            '
